<script>

let weakQuiz = JSON.parse(localStorage.getItem("weakQuiz")) || [];

let weakQuizBtn = document.querySelector('a[href="weakQuiz.html"]');

let weakClassify = JSON.parse(localStorage.getItem("weakClassify")) || [];

let weakClassifyBtn = document.querySelector('a[href="weakClassify.html"]');

if(weakClassify.length > 0){

    weakClassifyBtn.classList.remove("disabled");

}else{

    weakClassifyBtn.classList.add("disabled");
    weakClassifyBtn.removeAttribute("href");

}

if(weakQuiz.length > 0){

    weakQuizBtn.classList.remove("disabled");

}else{

    weakQuizBtn.classList.add("disabled");
    weakQuizBtn.removeAttribute("href");

}

</script>

<script>

function toggleMenu(){

    const menu = document.getElementById("menu-panel");
    const overlay = document.getElementById("menu-overlay");

    menu.classList.toggle("open");
    overlay.classList.toggle("open");

}
</script>
