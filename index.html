<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ひとめぼき</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="home">

<div class="top-container">

    <h1 class="title">📖 ひとめぼき道場 ✏️</h1>

    <p class="subtitle">
        勘定科目をゲーム感覚で楽しくマスター！
    </p>

    <div class="section">

        <h2>🎯 一問一答モード</h2>

        <div class="button-row">

            <a href="quiz.html?mode=easy" class="menu-btn easy">
                <div class="btn-title">🌱 簡単モード</div>
                <div class="btn-sub">
                    基礎からしっかり学ぼう！
                </div>
            </a>

            <a href="quiz.html?mode=hard" class="menu-btn hard">
                <div class="btn-title">🔥 発展モード</div>
                <div class="btn-sub">
                    実力を試してレベルアップ！
                </div>
            </a>

        </div>

    </div>

    <div class="section">

        <h2>📂 分類モード</h2>

        <div class="button-row">

            <a href="classify.html?mode=easy" class="menu-btn easy">
                <div class="btn-title">🌱 簡単モード</div>
                <div class="btn-sub">
                    基礎からしっかり学ぼう！
                </div>
            </a>

            <a href="classify.html?mode=hard" class="menu-btn hard">
                <div class="btn-title">🔥 発展モード</div>
                <div class="btn-sub">
                    実力を試してレベルアップ！
                </div>
            </a>

        </div>

    </div>

<div class="section">

    <h2>🔥 苦手克服モード</h2>

    <div class="button-row">

<a href="weakQuiz.html" class="menu-btn weak">
    <div class="btn-title">
        🎯 一問一答形式
    </div>
    <div class="btn-sub">
        間違えた問題を克服しよう！
    </div>
</a>


　<a href="weakClassify.html" class="menu-btn weak">
    <div class="btn-title">
        📂 分類形式
    </div>
    <div class="btn-sub">
        苦手な勘定科目を復習しよう！
    </div>
　</a>

    </div>

</div>

</div>

<div class="section">

    <h2>📊 学習記録</h2>

    <div class="top-container">

        <p id="studyRecord"></p>

    </div>

</div>

<script>

let weakQuiz = JSON.parse(localStorage.getItem("weakQuiz")) || [];

let weakQuizBtn = document.querySelector('a[href="weakQuiz.html"]');

let weakClassify = JSON.parse(localStorage.getItem("weakClassify")) || [];

let weakClassifyBtn = document.querySelector('a[href="weakClassify.html"]');

if(weakClassify.length > 0){

    weakClassifyBtn.classList.remove("disabled");

}else{

    weakClassifyBtn.classList.add("disabled");
    weakClassifyBtn.removeAttribute("href");

}

if(weakQuiz.length > 0){

    weakQuizBtn.classList.remove("disabled");

}else{

    weakQuizBtn.classList.add("disabled");
    weakQuizBtn.removeAttribute("href");

}

</script>

<script>

let totalAnswered =
Number(localStorage.getItem("totalAnswered")) || 0;

let totalCorrect =
Number(localStorage.getItem("totalCorrect")) || 0;

let lastStudy =
localStorage.getItem("lastStudy") || "まだありません";

let weakCount =
new Set([...weakQuiz, ...weakClassify]).size;

let percentage = 0;

if(totalAnswered > 0){
    percentage =
    Math.round(totalCorrect / totalAnswered * 100);
}

document.getElementById("studyRecord").innerHTML = `
総問題数：${totalAnswered}問<br><br>

正解数：${totalCorrect}問<br><br>

正答率：${percentage}%<br><br>

🔥 現在の苦手問題：${weakCount}問<br><br>

最終学習日：${lastStudy}
`;

</script>

</body>
</html>
