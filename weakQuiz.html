<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>苦手克服　一問一答</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-container">

<h1>🔥　苦手克服　一問一答</h1>

<div class="progress-tag" id="progressTag">
問題 1 / 23
</div>

<div class="question-card">

<h2 id="question"></h2>
<div class="answer-area" id="answerArea">
<button class="asset answer-btn" onclick="checkAnswer('資産')">
📁<br>
<span>資産</span>
</button>
<button class="liability answer-btn" onclick="checkAnswer('負債')">
🏦<br>
<span>負債</span>
</button>
<button class="equity answer-btn" onclick="checkAnswer('純資産')">
🌱<br>
<span>純資産</span>
</button>
<button class="expense answer-btn" onclick="checkAnswer('費用')">
📈<br>
<span>費用</span>
</button>
<button class="revenue answer-btn" onclick="checkAnswer('収益')">
💴<br>
<span>収益</span>
</button>
<button id="otherBtn" class="other answer-btn" onclick="checkAnswer('その他')" style="display:none;">
    📌<br>
    <span>その他</span>
</button>
</div>
<h2 id="result"></h2>

<br>

<button id="nextBtn" onclick="nextQuestion()" style="display:none;">
次の問題へ
</button>

<br><br>

<a href="index.html">
    <button>トップへ戻る</button>
</a>

<script src="data.js"></script>

<script>
// URLからモードを取得
const params = new URLSearchParams(window.location.search);
const mode = params.get("mode");
if(mode === "easy"){
    document.body.classList.add("easy-mode");
}else{
    document.body.classList.add("hard-mode");
}

// 苦手問題だけ取得
let weakQuiz = JSON.parse(localStorage.getItem("weakQuiz")) || [];

const questionNames = weakQuiz.map(item => {
    return item.replace("は何に分類される？","");
});

// 問題データを作成
const questions = questionNames.map(name => ({
    question: `${name}は何に分類される？`,
    answer: accounts[name].category,
    explanation: accounts[name].explanation
}));

// その他表示判定
let hasOther = questions.some(q => q.answer === "その他");

if(hasOther){
    document.getElementById("otherBtn").style.display = "inline-block";
}

// 順番だけランダム
questions.sort(() => Math.random() - 0.5);

console.log("mode =", mode);
console.log("questions =", questions.length);
console.log(questions);

let currentQuestion = 0;
let score = 0;
let weakCorrect = JSON.parse(localStorage.getItem("weakCorrect")) || {};

if(questions.length === 0){

    document.body.innerHTML = `

    <div class="top-container">

        <h1>🔥 苦手克服 一問一答</h1>

        <h2>🎉 苦手問題はありません！</h2>

        <p>通常モードで問題を解いて<br>
        苦手を作るとここに表示されます。</p>

        <br>

        <a href="index.html">
            <button>トップへ戻る</button>
        </a>

    </div>

    `;

}else{

    showQuestion();

}

function showQuestion() {

document.getElementById("progressTag").innerHTML =
"問題 " + (currentQuestion + 1) + " / " + questions.length;

document.getElementById("question").innerHTML =
questions[currentQuestion].question;

    document.getElementById("result").innerHTML = "";

    document.getElementById("nextBtn").style.display = "none";

    const buttons = document.querySelectorAll(
    ".asset, .liability, .equity, .expense, .revenue, .other"
);

    buttons.forEach(button => {
        button.disabled = false;
    });
}

function checkAnswer(answer) {

    const q = questions[currentQuestion];

    // 学習記録更新
let totalAnswered =
Number(localStorage.getItem("totalAnswered")) || 0;

let totalCorrect =
Number(localStorage.getItem("totalCorrect")) || 0;

totalAnswered++;

if(answer === q.answer){
    totalCorrect++;
}

localStorage.setItem("totalAnswered", totalAnswered);
localStorage.setItem("totalCorrect", totalCorrect);


// 今日の記録
const today = new Date().toLocaleDateString("ja-JP");

let savedDate = localStorage.getItem("todayDate");

let todayAnswered =
Number(localStorage.getItem("todayAnswered")) || 0;

let todayCorrect =
Number(localStorage.getItem("todayCorrect")) || 0;


if(savedDate !== today){

    todayAnswered = 0;
    todayCorrect = 0;

    localStorage.setItem("todayDate", today);
}


todayAnswered++;

if(answer === q.answer){
    todayCorrect++;
}


localStorage.setItem("todayAnswered", todayAnswered);
localStorage.setItem("todayCorrect", todayCorrect);


// 最終学習日
localStorage.setItem("lastStudy", today);

    if (answer === q.answer) {

        document.getElementById("result").innerHTML =
            "⭕ 正解！<br><br>" +
            "解説：<br>" +
            q.explanation;

        score++;
        weakCorrect[q.question] =
(weakCorrect[q.question] || 0) + 1;


if(weakCorrect[q.question] >= 3){

    let weakQuiz =
    JSON.parse(localStorage.getItem("weakQuiz")) || [];

    weakQuiz = weakQuiz.filter(item =>
        item !== q.question.replace("は何に分類される？","")
    );

    localStorage.setItem(
        "weakQuiz",
        JSON.stringify(weakQuiz)
    );

    delete weakCorrect[q.question];
}

localStorage.setItem(
    "weakCorrect",
    JSON.stringify(weakCorrect)
);
} else {

    document.getElementById("result").innerHTML =
        "❌ 不正解<br><br>" +
        "正解：" + q.answer + "<br><br>" +
        "解説：<br>" +
        q.explanation;

    // 連続正解数をリセット
let weakCorrect =
JSON.parse(localStorage.getItem("weakCorrect")) || {};

weakCorrect[q.question] = 0;

localStorage.setItem(
    "weakCorrect",
    JSON.stringify(weakCorrect)
);


    // 苦手問題として保存
    let weakQuiz = JSON.parse(localStorage.getItem("weakQuiz")) || [];

    if(!weakQuiz.includes(q.question.replace("は何に分類される？",""))){

    weakQuiz.push(
        q.question.replace("は何に分類される？","")
    );

}

    localStorage.setItem("weakQuiz", JSON.stringify(weakQuiz));

}

    document.getElementById("nextBtn").style.display = "inline-block";

    const buttons = document.querySelectorAll(
    ".asset, .liability, .equity, .expense, .revenue, .other"
);

    buttons.forEach(button => {
        button.disabled = true;
    });
}

function nextQuestion() {

    currentQuestion++;

    if (currentQuestion < questions.length) {

        showQuestion();

    } else {

        let percentage =
        Math.round(score / questions.length * 100);

        let rank = "";

        if (percentage === 100) {
            rank = "🏆 Sランク";
        }
        else if (percentage >= 90) {
            rank = "🥇 Aランク";
        }
        else if (percentage >= 80) {
            rank = "🥈 Bランク";
        }
        else if (percentage >= 70) {
            rank = "🥉 Cランク";
        }
        else {
            rank = "📖 Dランク";
        }

        document.body.innerHTML = `

        <div class="top-container">

            <h1>結果発表</h1>

            <h2>${score} / ${questions.length}問正解</h2>

            <h2>正答率 ${percentage}%</h2>

            <h2>${rank}</h2>

            <br><br>

            <a href="index.html">

                <button class="menu-btn weak">

                    トップへ戻る

                </button>

            </a>

        </div>

        `;
    }
}
</script>

</div>

</div>

</body>
</html>
