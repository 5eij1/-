<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>苦手克服　分類</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🔥　苦手克服　分類</h1>

<h2>勘定科目を選択してください</h2>

<div class="boxes">

    <div class="box asset">
        <h3 onclick="classify('資産')">資産</h3>
        <div id="assetBox"></div>
    </div>

    <div class="box liability">
        <h3 onclick="classify('負債')">負債</h3>
        <div id="liabilityBox"></div>
    </div>

    <div class="box equity">
        <h3 onclick="classify('純資産')">純資産</h3>
        <div id="equityBox"></div>
    </div>

    <div class="box expense">
        <h3 onclick="classify('費用')">費用</h3>
        <div id="expenseBox"></div>
    </div>

    <div class="box revenue">
        <h3 onclick="classify('収益')">収益</h3>
        <div id="revenueBox"></div>
    </div>
    
    <div id="otherArea" class="box other" style="display:none;">
        <h3 onclick="classify('その他')">その他</h3>
        <div id="otherBox"></div>
    </div>

</div>


<h2 id="selected">選択中：なし</h2>

<div id="items"></div>

<br><br>

<button id="finishBtn" onclick="finish()">
採点する
</button>

<br><br>

<a href="index.html">
<button>トップへ戻る</button>
</a>

<script src="data.js"></script>

<script>
// モード取得
const params = new URLSearchParams(window.location.search);
const mode = params.get("mode");

let selectedItem = "";

// 苦手問題だけ取得
let weakClassify = JSON.parse(localStorage.getItem("weakClassify")) || [];

let allItems = weakClassify;

let selectedItems = allItems;


// その他表示判定
let hasOther = selectedItems.some(item =>
    accounts[item].category === "その他"
);

const boxes = document.querySelector(".boxes");

if(hasOther){

    document.getElementById("otherArea").style.display = "block";

    boxes.classList.add("weak-mode-layout");
    boxes.classList.add("has-other");

}else{

    boxes.classList.add("weak-mode-layout");
    boxes.classList.add("no-other");

}

let userAnswers = {};

let itemsHtml = "";

for(let item of selectedItems){

itemsHtml += `
<button id="${item}" onclick="selectItem('${item}')">
${item}
</button>
`;

}

document.getElementById("items").innerHTML = itemsHtml;


function selectItem(item){

selectedItem = item;

document.getElementById("selected").innerHTML =
"選択中：" + item;

}


function classify(category){

if(selectedItem === ""){

alert("先に勘定科目を選択してください");

return;

}

userAnswers[selectedItem] = category;

let boxId = "";

if(category==="資産") boxId="assetBox";
if(category==="負債") boxId="liabilityBox";
if(category==="純資産") boxId="equityBox";
if(category==="費用") boxId="expenseBox";
if(category==="収益") boxId="revenueBox";
if(category==="その他") boxId="otherBox";


document.getElementById(boxId).innerHTML +=

`
<div
id="placed-${selectedItem}"

style="
background:#f2f2f2;
padding:10px;
margin:8px;
border-radius:10px;
cursor:pointer;
"

onclick="returnItem('${selectedItem}')">

${selectedItem}

</div>
`;

document.getElementById(selectedItem).style.display="none";

selectedItem="";

document.getElementById("selected").innerHTML=
"選択中：なし";

}


function returnItem(item){

delete userAnswers[item];

const placed = document.getElementById("placed-"+item);

if(placed){

placed.remove();

}

document.getElementById(item).style.display="inline-block";

selectedItem="";

document.getElementById("selected").innerHTML=
"選択中：なし";

}



function finish(){

let score = 0;

let wrongList = "";

for(let item of selectedItems){

if(userAnswers[item] !== undefined){

if(userAnswers[item] === accounts[item].category){

score++;
// 苦手克服カウント
let weakCorrectClassify =
JSON.parse(localStorage.getItem("weakCorrectClassify")) || {};

weakCorrectClassify[item] =
(weakCorrectClassify[item] || 0) + 1;


// 3回正解したら分類の苦手から削除
if(weakCorrectClassify[item] >= 3){

    let weakClassify =
    JSON.parse(localStorage.getItem("weakClassify")) || [];

    weakClassify =
    weakClassify.filter(name => name !== item);

    localStorage.setItem(
        "weakClassify",
        JSON.stringify(weakClassify)
    );

    delete weakCorrectClassify[item];
}


localStorage.setItem(
    "weakCorrectClassify",
    JSON.stringify(weakCorrectClassify)
);

}else{

// 間違えたら連続正解数をリセット
let weakCorrectClassify =
JSON.parse(localStorage.getItem("weakCorrectClassify")) || {};

weakCorrectClassify[item] = 0;

localStorage.setItem(
    "weakCorrectClassify",
    JSON.stringify(weakCorrectClassify)
);

// 苦手問題として保存
let weakClassify = JSON.parse(localStorage.getItem("weakClassify")) || [];

if(!weakClassify.includes(item)){
    weakClassify.push(item);
}

localStorage.setItem("weakClassify", JSON.stringify(weakClassify));


wrongList += `

<div class="wrong-card">

    <div class="wrong-item">
        ❌ ${item}
    </div>

    <div class="your-answer">
        あなた：${userAnswers[item]}
    </div>

    <div class="correct-answer">
        正解：${accounts[item].category}
    </div>

    <div class="explanation">
        💡 解説：${accounts[item].explanation}
    </div>

</div>

`;

}

}

}

let solved = Object.keys(userAnswers).length;

if(solved===0){

alert("まだ1問も回答していません");

return;

}


// ========================
// 学習記録
// ========================

// 総合記録
let totalAnswered =
Number(localStorage.getItem("totalAnswered")) || 0;

let totalCorrect =
Number(localStorage.getItem("totalCorrect")) || 0;

totalAnswered += solved;
totalCorrect += score;

localStorage.setItem(
    "totalAnswered",
    totalAnswered
);

localStorage.setItem(
    "totalCorrect",
    totalCorrect
);


// 今日の記録
const today =
new Date().toLocaleDateString("ja-JP");

let savedDate =
localStorage.getItem("todayDate");

let todayAnswered =
Number(localStorage.getItem("todayAnswered")) || 0;

let todayCorrect =
Number(localStorage.getItem("todayCorrect")) || 0;


// 日付が変わったらリセット
if(savedDate !== today){

    todayAnswered = 0;
    todayCorrect = 0;

    localStorage.setItem(
        "todayDate",
        today
    );

}

todayAnswered += solved;

todayCorrect += score;

localStorage.setItem(
    "todayAnswered",
    todayAnswered
);

localStorage.setItem(
    "todayCorrect",
    todayCorrect
);


// 最終学習日
localStorage.setItem(
    "lastStudy",
    today
);

let percentage = Math.round(score / solved * 100);

let rank="";

if(percentage==100) rank="Sランク"
else if(percentage>=90) rank="Aランク";
else if(percentage>=80) rank="Bランク";
else if(percentage>=70) rank="Cランク";
else if(percentage>=60) rank="Dランク";
else rank="📖 Eランク";

if(wrongList===""){

wrongList="<h3>🎉 間違えた問題はありません！</h3>";

}

let remainingWeak =
JSON.parse(localStorage.getItem("weakClassify")) || [];

if(remainingWeak.length === 0){

    document.body.innerHTML = `

    <div class="top-container">

        <h1>🎉 苦手克服完了！</h1>

        <h2>🔥 苦手問題はすべてなくなりました</h2>

        <p>通常モードでさらに力を伸ばそう！</p>

    </div>

    `;

    setTimeout(() => {
        location.href = "index.html";
    },3000);

    return;

}

document.body.innerHTML=`

<h1>結果発表</h1>

<h2>${score}/${solved}問正解</h2>

<h3>全${selectedItems.length}問中 ${solved}問回答</h3>

<h3>未回答 ${selectedItems.length-solved}問</h3>

<h2>正答率 ${percentage}%</h2>

<h2>${rank}</h2>

<hr>

<h2>間違えた問題</h2>

${wrongList}

<br>

<a href="index.html">

<button>トップへ戻る</button>

</a>

`;

}

</script>

</body>
</html>
