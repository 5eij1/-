<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>一問一答モード</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top-container">

<h1>🎯 一問一答モード</h1>

<div class="progress-tag" id="progressTag">
問題 1 / 23
</div>

<div class="question-card">

<h2 id="question"></h2>
<div class="answer-area" id="answerArea">
<button class="asset answer-btn" onclick="checkAnswer('資産')">
📁<br>
<span>資産</span>
</button>
<button class="liability answer-btn" onclick="checkAnswer('負債')">
🏦<br>
<span>負債</span>
</button>
<button class="equity answer-btn" onclick="checkAnswer('純資産')">
🌱<br>
<span>純資産</span>
</button>
<button class="expense answer-btn" onclick="checkAnswer('費用')">
📈<br>
<span>費用</span>
</button>
<button class="revenue answer-btn" onclick="checkAnswer('収益')">
💴<br>
<span>収益</span>
</button>
<button id="otherBtn" class="other" onclick="checkAnswer('その他')" style="display:none;">
    その他
</button>
</div>
<h2 id="result"></h2>

<br>

<button id="nextBtn" onclick="nextQuestion()" style="display:none;">
次の問題へ
</button>

<br><br>

<a href="index.html">
    <button>トップへ戻る</button>
</a>

<script src="data.js"></script>

<script>
// URLからモードを取得
const params = new URLSearchParams(window.location.search);
const mode = params.get("mode");
if(mode === "easy"){
    document.body.classList.add("easy-mode");
}else{
    document.body.classList.add("hard-mode");
}
if (mode !== "easy") {
    document.getElementById("otherBtn").style.display = "inline-block";
}

// 出題する勘定科目を決定
const questionNames = Object.keys(accounts).filter(name => {
    if (mode === "easy") {
        return accounts[name].easy;
    }
    return true;
});

// 問題データを作成
const questions = questionNames.map(name => ({
    question: `${name}は何に分類される？`,
    answer: accounts[name].category,
    explanation: accounts[name].explanation
}));

// 順番だけランダム
questions.sort(() => Math.random() - 0.5);

console.log("mode =", mode);
console.log("questions =", questions.length);
console.log(questions);

let currentQuestion = 0;
let score = 0;

showQuestion();

function showQuestion() {

document.getElementById("progressTag").innerHTML =
"問題 " + (currentQuestion + 1) + " / " + questions.length;

document.getElementById("question").innerHTML =
questions[currentQuestion].question;

    document.getElementById("result").innerHTML = "";

    document.getElementById("nextBtn").style.display = "none";

    const buttons = document.querySelectorAll(
    ".asset, .liability, .equity, .expense, .revenue, .other"
);

    buttons.forEach(button => {
        button.disabled = false;
    });
}

function checkAnswer(answer) {

    const q = questions[currentQuestion];

    if (answer === q.answer) {

        document.getElementById("result").innerHTML =
            "⭕ 正解！<br><br>" +
            "解説：<br>" +
            q.explanation;

        score++;

    } else {

        document.getElementById("result").innerHTML =
            "❌ 不正解<br><br>" +
            "正解：" + q.answer + "<br><br>" +
            "解説：<br>" +
            q.explanation;
    }

    document.getElementById("nextBtn").style.display = "inline-block";

    const buttons = document.querySelectorAll(
    ".asset, .liability, .equity, .expense, .revenue, .other"
);

    buttons.forEach(button => {
        button.disabled = true;
    });
}

function nextQuestion() {

    currentQuestion++;

    if (currentQuestion < questions.length) {

        showQuestion();

    } else {

        let percentage =
        Math.round(score / questions.length * 100);

        let rank = "";

        if (percentage === 100) {
            rank = "🏆 Sランク";
        }
        else if (percentage >= 90) {
            rank = "🥇 Aランク";
        }
        else if (percentage >= 80) {
            rank = "🥈 Bランク";
        }
        else if (percentage >= 70) {
            rank = "🥉 Cランク";
        }
        else {
            rank = "📖 Dランク";
        }

        document.body.innerHTML = `

        <div class="top-container">

            <h1>結果発表</h1>

            <h2>${score} / ${questions.length}問正解</h2>

            <h2>正答率 ${percentage}%</h2>

            <h2>${rank}</h2>

            <br><br>

            <a href="index.html">

                <button class="menu-btn classify">

                    トップへ戻る

                </button>

            </a>

        </div>

        `;
    }
}
</script>

</div>

</div>

</body>
</html>
